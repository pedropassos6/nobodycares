        <div class="lightbox" id="lightbox"> <!--this is the fullscreen overlay, hidden by default -->
            <span class="close">&times;</span> <!-- close button, &times is the X symbol -->
            <img class="lightbox-img" src="" alt=""> <!--starts empty and javascript inserts the image-->
            <button class="prev">&#10094;</button>
            <button class="next">&#10095;</button>
        </div>

        <script>
            const images = document.querySelectorAll('.gallery img');
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.querySelector('.lightbox-img');
            const closeBtn = document.querySelector('.close');
            const nextBtn = document.querySelector('.next');
            const prevBtn = document.querySelector('.prev');

            let currentIndex = 0;

            function showImage(index) {
            lightboxImg.src = images[index].src;
            currentIndex = index;
            }

            images.forEach((img, index) => {
            img.addEventListener('click', () => {
                lightbox.classList.add('active');
                showImage(index);
            });
            });

            closeBtn.addEventListener('click', () => {
                lightbox.classList.remove('active');
            });

            nextBtn.addEventListener('click', () => {
                currentIndex = (currentIndex + 1) % images.length;
                showImage(currentIndex);
            });

            prevBtn.addEventListener('click', () => {
                currentIndex = (currentIndex - 1 + images.length) % images.length;
                showImage(currentIndex);
            });

            lightbox.addEventListener('click', (e) => {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
            });
        </script>
